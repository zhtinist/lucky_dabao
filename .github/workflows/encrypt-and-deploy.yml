name: 部署到 GitHub Pages

on:
  push:
    branches: [ source ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Generate index.html
      run: |
        cat > index.html << 'EOF'
        <!DOCTYPE html>
        <html lang="zh-CN">
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>加密文件库</title>
          <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
          <style>
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
            body {
              font-family: 'Segoe UI', system-ui, sans-serif;
              background: #0f0f1a; color: #e0e0e0;
              min-height: 100vh; display: flex;
              align-items: center; justify-content: center;
            }
            /* Login */
            #login {
              background: #1a1a2e; border: 1px solid #2a2a4a;
              border-radius: 16px; padding: 2.5rem 2rem;
              width: 360px; text-align: center;
              box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            }
            #login h1 { font-size: 1.6rem; margin-bottom: .4rem; }
            #login p  { color: #888; font-size: .9rem; margin-bottom: 1.8rem; }
            #login input {
              width: 100%; padding: 12px 14px;
              background: #0f0f1a; border: 1px solid #333;
              border-radius: 8px; color: #e0e0e0; font-size: 1rem;
              margin-bottom: 1rem; outline: none; transition: border-color .2s;
            }
            #login input:focus { border-color: #7c6af7; }
            #login button {
              width: 100%; padding: 12px;
              background: linear-gradient(135deg, #7c6af7, #5e9cf7);
              border: none; border-radius: 8px;
              color: #fff; font-size: 1rem; cursor: pointer; transition: opacity .2s;
            }
            #login button:hover { opacity: .85; }
            #login-err { color: #f77; font-size: .85rem; margin-top: .8rem; min-height: 1.2em; }
            /* App */
            #app {
              display: none; flex-direction: column;
              width: 100vw; height: 100vh;
            }
            #topbar {
              display: flex; align-items: center; gap: .8rem;
              padding: 0 1.2rem; height: 48px; flex-shrink: 0;
              background: #1a1a2e; border-bottom: 1px solid #2a2a4a;
            }
            #topbar .title { font-size: .95rem; color: #aaa; flex: 1; }
            #back-btn {
              display: none; align-items: center; gap: .4rem;
              background: none; border: 1px solid #2a2a4a;
              color: #a89cf7; border-radius: 6px;
              padding: 5px 12px; font-size: .85rem; cursor: pointer;
              transition: border-color .2s;
            }
            #back-btn:hover { border-color: #7c6af7; }
            #viewer {
              flex: 1; overflow: hidden;
            }
            #viewer iframe {
              width: 100%; height: 100%; border: none;
            }
          </style>
        </head>
        <body>

        <div id="login">
          <h1>🔐 加密文件库</h1>
          <p>请输入密码以访问内容</p>
          <input type="password" id="pwd" placeholder="访问密码" />
          <button onclick="doLogin()">进入</button>
          <div id="login-err"></div>
        </div>

        <div id="app">
          <div id="topbar">
            <button id="back-btn" onclick="goHome()">← 返回</button>
            <span class="title" id="page-title">首页</span>
          </div>
          <div id="viewer">
            <iframe id="frame" sandbox="allow-scripts allow-same-origin"></iframe>
          </div>
        </div>

        <script>
          let PASSWORD = '';
          let fileTree = [];

          document.getElementById('pwd').addEventListener('keydown', e => {
            if (e.key === 'Enter') doLogin();
          });

          async function doLogin() {
            const pwd = document.getElementById('pwd').value.trim();
            const err = document.getElementById('login-err');
            if (!pwd) { err.textContent = '请输入密码'; return; }
            try {
              fileTree = await (await fetch('./file-tree.json')).json();
              const first = findFirstFile(fileTree);
              if (!first) { bootApp(pwd); return; }
              const enc = await (await fetch('./encrypted/' + first)).text();
              const dec = CryptoJS.AES.decrypt(enc, pwd).toString(CryptoJS.enc.Utf8);
              if (dec) { err.textContent = ''; bootApp(pwd); }
              else     { err.textContent = '密码错误，请重试'; }
            } catch(e) { err.textContent = '验证失败，请重试'; }
          }

          function findFirstFile(nodes) {
            for (const n of nodes) {
              if (n.type === 'file') return n.path;
              if (n.type === 'dir') { const f = findFirstFile(n.children); if (f) return f; }
            }
            return null;
          }

          function bootApp(pwd) {
            PASSWORD = pwd;
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display   = 'flex';
            openFileByName('index.html');
          }

          // 根据文件名在树中找到路径
          function findPath(nodes, name) {
            for (const n of nodes) {
              if (n.type === 'file' && n.name === name) return n.path;
              if (n.type === 'dir') { const f = findPath(n.children, name); if (f) return f; }
            }
            return null;
          }

          async function openFileByPath(encPath, name) {
            const enc = await (await fetch('./encrypted/' + encPath)).text();
            const dec = CryptoJS.AES.decrypt(enc, PASSWORD).toString(CryptoJS.enc.Utf8);
            const blob = new Blob([dec], { type: 'text/html' });
            const url  = URL.createObjectURL(blob);
            document.getElementById('frame').src = url;
            document.getElementById('page-title').textContent = name === 'index.html' ? '首页' : name.replace('.html','');
            document.getElementById('back-btn').style.display = name === 'index.html' ? 'none' : 'flex';
          }

          window.openFileByName = function(filename) {
            const p = findPath(fileTree, filename);
            if (p) openFileByPath(p, filename);
          };

          function goHome() {
            openFileByName('index.html');
          }
        </script>
        </body>
        </html>
        EOF

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
