name: 加密并部署到 GitHub Pages

on:
  push:
    branches: [ source ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  encrypt-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install crypto-js

    - name: Encrypt files and generate site
      env:
        SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
      run: |
        node << 'SCRIPT'
        const CryptoJS = require('crypto-js');
        const fs = require('fs');
        const path = require('path');

        const password = process.env.SITE_PASSWORD;
        const sourceDir = './src';
        const outputDir = './encrypted';

        // 递归加密所有文件，保留目录结构
        function encryptDir(dir, baseDir) {
          fs.readdirSync(dir).forEach(name => {
            const full = path.join(dir, name);
            const rel  = path.relative(baseDir, full);
            if (fs.statSync(full).isDirectory()) {
              encryptDir(full, baseDir);
            } else {
              const content   = fs.readFileSync(full, 'utf8');
              const encrypted = CryptoJS.AES.encrypt(content, password).toString();
              const dest      = path.join(outputDir, rel + '.enc');
              fs.mkdirSync(path.dirname(dest), { recursive: true });
              fs.writeFileSync(dest, encrypted);
              console.log('encrypted:', rel);
            }
          });
        }

        if (fs.existsSync(sourceDir)) {
          fs.mkdirSync(outputDir, { recursive: true });
          encryptDir(sourceDir, sourceDir);
        }

        // 构建文件树 JSON（保留目录层级）
        function buildTree(dir, baseDir) {
          const result = [];
          fs.readdirSync(dir).sort().forEach(name => {
            const full = path.join(dir, name);
            const rel  = path.relative(baseDir, full);
            if (fs.statSync(full).isDirectory()) {
              result.push({ type: 'dir', name, children: buildTree(full, baseDir) });
            } else {
              result.push({ type: 'file', name, path: rel + '.enc' });
            }
          });
          return result;
        }

        const tree = fs.existsSync(sourceDir) ? buildTree(sourceDir, sourceDir) : [];
        fs.writeFileSync('file-tree.json', JSON.stringify(tree, null, 2));
        console.log('file-tree.json written');
        SCRIPT

    - name: Generate index.html
      run: |
        cat > index.html << 'EOF'
        <!DOCTYPE html>
        <html lang="zh-CN">
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>加密文件库</title>
          <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
          <style>
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

            body {
              font-family: 'Segoe UI', system-ui, sans-serif;
              background: #0f0f1a;
              color: #e0e0e0;
              min-height: 100vh;
              display: flex;
              align-items: center;
              justify-content: center;
            }

            /* ── Login ── */
            #login {
              background: #1a1a2e;
              border: 1px solid #2a2a4a;
              border-radius: 16px;
              padding: 2.5rem 2rem;
              width: 360px;
              text-align: center;
              box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            }
            #login h1 { font-size: 1.6rem; margin-bottom: 0.4rem; }
            #login p  { color: #888; font-size: 0.9rem; margin-bottom: 1.8rem; }
            #login input {
              width: 100%; padding: 12px 14px;
              background: #0f0f1a; border: 1px solid #333;
              border-radius: 8px; color: #e0e0e0; font-size: 1rem;
              margin-bottom: 1rem; outline: none;
              transition: border-color .2s;
            }
            #login input:focus { border-color: #7c6af7; }
            #login button {
              width: 100%; padding: 12px;
              background: linear-gradient(135deg, #7c6af7, #5e9cf7);
              border: none; border-radius: 8px;
              color: #fff; font-size: 1rem; cursor: pointer;
              transition: opacity .2s;
            }
            #login button:hover { opacity: .85; }
            #login-err { color: #f77; font-size: .85rem; margin-top: .8rem; min-height: 1.2em; }

            /* ── App shell ── */
            #app {
              display: none;
              width: 100vw; height: 100vh;
              flex-direction: row;
            }

            /* ── Sidebar ── */
            #sidebar {
              width: 280px; min-width: 220px;
              background: #1a1a2e;
              border-right: 1px solid #2a2a4a;
              display: flex; flex-direction: column;
              overflow: hidden;
            }
            #sidebar-header {
              padding: 1.2rem 1rem;
              border-bottom: 1px solid #2a2a4a;
              font-weight: 600; font-size: .95rem;
              color: #aaa; letter-spacing: .05em;
            }
            #tree {
              flex: 1; overflow-y: auto; padding: .5rem 0;
            }
            #tree::-webkit-scrollbar { width: 4px; }
            #tree::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

            /* tree nodes */
            .tree-item {
              display: flex; align-items: center; gap: 6px;
              padding: 5px 12px; cursor: pointer;
              font-size: .88rem; user-select: none;
              transition: background .15s;
              white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            }
            .tree-item:hover { background: #252540; }
            .tree-item.active { background: #2e2e55; color: #a89cf7; }
            .tree-item .icon { flex-shrink: 0; font-size: 1rem; }
            .tree-item .label { overflow: hidden; text-overflow: ellipsis; }

            .tree-folder > .tree-children { display: none; }
            .tree-folder.open > .tree-children { display: block; }
            .tree-folder > .tree-item .arrow {
              font-size: .7rem; color: #666; transition: transform .2s; flex-shrink: 0;
            }
            .tree-folder.open > .tree-item .arrow { transform: rotate(90deg); }

            /* indent levels */
            .tree-children { padding-left: 16px; }

            /* ── Main content ── */
            #main {
              flex: 1; display: flex; flex-direction: column; overflow: hidden;
            }
            #topbar {
              padding: .9rem 1.4rem;
              border-bottom: 1px solid #2a2a4a;
              font-size: .85rem; color: #666;
              background: #16162a;
            }
            #viewer {
              flex: 1; overflow: auto; padding: 1.5rem;
            }
            #viewer::-webkit-scrollbar { width: 6px; }
            #viewer::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

            #placeholder {
              height: 100%; display: flex; flex-direction: column;
              align-items: center; justify-content: center;
              color: #444; gap: .6rem;
            }
            #placeholder .big { font-size: 3rem; }

            #file-content {
              display: none;
              background: #1a1a2e; border: 1px solid #2a2a4a;
              border-radius: 10px; padding: 1.4rem;
            }
            #file-content h2 { font-size: 1rem; color: #a89cf7; margin-bottom: 1rem; }
            #file-content pre {
              white-space: pre-wrap; word-break: break-word;
              font-family: 'Cascadia Code', 'Fira Code', monospace;
              font-size: .85rem; line-height: 1.6; color: #ccc;
            }
            #file-content iframe {
              width: 100%; height: 70vh; border: none;
              border-radius: 6px; background: #fff;
            }

            #loading {
              display: none; text-align: center; padding: 3rem; color: #666;
            }
          </style>
        </head>
        <body>

        <!-- Login -->
        <div id="login">
          <h1>🔐 加密文件库</h1>
          <p>请输入密码以访问内容</p>
          <input type="password" id="pwd" placeholder="访问密码" />
          <button onclick="doLogin()">进入</button>
          <div id="login-err"></div>
        </div>

        <!-- App -->
        <div id="app">
          <div id="sidebar">
            <div id="sidebar-header">📁 文件目录</div>
            <div id="tree"></div>
          </div>
          <div id="main">
            <div id="topbar" id="breadcrumb">选择左侧文件查看内容</div>
            <div id="viewer">
              <div id="placeholder">
                <div class="big">🗂️</div>
                <div>从左侧选择一个文件</div>
              </div>
              <div id="loading">解密中...</div>
              <div id="file-content">
                <h2 id="file-title"></h2>
                <div id="file-body"></div>
              </div>
            </div>
          </div>
        </div>

        <script>
          let PASSWORD = '';

          // ── Login ──────────────────────────────────────────
          document.getElementById('pwd').addEventListener('keydown', e => {
            if (e.key === 'Enter') doLogin();
          });

          async function doLogin() {
            const pwd = document.getElementById('pwd').value.trim();
            const err = document.getElementById('login-err');
            if (!pwd) { err.textContent = '请输入密码'; return; }

            // verify with first .enc file
            try {
              const res  = await fetch('./file-tree.json');
              const tree = await res.json();
              const first = findFirstFile(tree);
              if (!first) { bootApp(pwd); return; }

              const r2  = await fetch('./encrypted/' + first);
              const enc = await r2.text();
              const dec = CryptoJS.AES.decrypt(enc, pwd).toString(CryptoJS.enc.Utf8);
              if (dec) { err.textContent = ''; bootApp(pwd); }
              else     { err.textContent = '密码错误，请重试'; }
            } catch(e) {
              err.textContent = '验证失败，请重试';
            }
          }

          function findFirstFile(nodes) {
            for (const n of nodes) {
              if (n.type === 'file') return n.path;
              if (n.type === 'dir') {
                const f = findFirstFile(n.children);
                if (f) return f;
              }
            }
            return null;
          }

          // ── Boot ───────────────────────────────────────────
          async function bootApp(pwd) {
            PASSWORD = pwd;
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display   = 'flex';

            const res  = await fetch('./file-tree.json');
            const tree = await res.json();
            renderTree(tree, document.getElementById('tree'));
          }

          // ── Tree rendering ─────────────────────────────────
          function renderTree(nodes, container) {
            nodes.forEach(node => {
              if (node.type === 'dir') {
                const folder = document.createElement('div');
                folder.className = 'tree-folder';

                const row = document.createElement('div');
                row.className = 'tree-item';
                row.innerHTML = `<span class="arrow">▶</span><span class="icon">📂</span><span class="label">${node.name}</span>`;
                row.onclick = () => folder.classList.toggle('open');

                const children = document.createElement('div');
                children.className = 'tree-children';
                renderTree(node.children, children);

                folder.appendChild(row);
                folder.appendChild(children);
                container.appendChild(folder);
              } else {
                const item = document.createElement('div');
                item.className = 'tree-item';
                const icon = getIcon(node.name);
                item.innerHTML = `<span class="icon">${icon}</span><span class="label" title="${node.name}">${node.name}</span>`;
                item.onclick = () => openFile(node.path, node.name, item);
                container.appendChild(item);
              }
            });
          }

          function getIcon(name) {
            const ext = name.split('.').pop().toLowerCase();
            const map = { html:'🌐', htm:'🌐', md:'📝', txt:'📄', js:'📜', ts:'📜',
                          css:'🎨', json:'📋', png:'🖼️', jpg:'🖼️', jpeg:'🖼️',
                          gif:'🖼️', svg:'🖼️', pdf:'📕', zip:'📦', mp4:'🎬', mp3:'🎵' };
            return map[ext] || '📄';
          }

          // ── File viewer ────────────────────────────────────
          let activeItem = null;

          async function openFile(encPath, name, itemEl) {
            if (activeItem) activeItem.classList.remove('active');
            activeItem = itemEl;
            itemEl.classList.add('active');

            document.getElementById('topbar').textContent = name;
            document.getElementById('placeholder').style.display  = 'none';
            document.getElementById('file-content').style.display = 'none';
            document.getElementById('loading').style.display      = 'block';

            try {
              const res  = await fetch('./encrypted/' + encPath);
              const enc  = await res.text();
              const dec  = CryptoJS.AES.decrypt(enc, PASSWORD).toString(CryptoJS.enc.Utf8);

              document.getElementById('loading').style.display      = 'none';
              document.getElementById('file-content').style.display = 'block';
              document.getElementById('file-title').textContent     = name;

              const body = document.getElementById('file-body');
              const ext  = name.split('.').pop().toLowerCase();

              if (['html','htm'].includes(ext)) {
                const blob = new Blob([dec], { type: 'text/html' });
                const url  = URL.createObjectURL(blob);
                body.innerHTML = `<iframe src="${url}"></iframe>`;
              } else if (['png','jpg','jpeg','gif','svg'].includes(ext)) {
                body.innerHTML = `<img src="data:image/${ext};base64,${btoa(dec)}" style="max-width:100%;border-radius:6px;">`;
              } else {
                body.innerHTML = `<pre>${escHtml(dec)}</pre>`;
              }
            } catch(e) {
              document.getElementById('loading').style.display = 'none';
              document.getElementById('file-content').style.display = 'block';
              document.getElementById('file-body').innerHTML = '<pre style="color:#f77">解密失败</pre>';
            }
          }

          function escHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          }
        </script>
        </body>
        </html>
        EOF

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
