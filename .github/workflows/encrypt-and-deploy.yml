name: 部署到 GitHub Pages

on:
  push:
    branches: [ source ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Generate index.html
      run: |
        cat > index.html << 'HTMLEOF'
        <!DOCTYPE html>
        <html lang="zh-CN">
        <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>加密文件库</title>
          <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
          <style>
            *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
            body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

            /* ── Login ── */
            #login { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 16px; padding: 2.5rem 2rem; width: 360px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
            #login h1 { font-size: 1.6rem; margin-bottom: .4rem; }
            #login p  { color: #888; font-size: .9rem; margin-bottom: 1.8rem; }
            #login input { width: 100%; padding: 12px 14px; background: #0f0f1a; border: 1px solid #333; border-radius: 8px; color: #e0e0e0; font-size: 1rem; margin-bottom: 1rem; outline: none; transition: border-color .2s; }
            #login input:focus { border-color: #7c6af7; }
            #login button { width: 100%; padding: 12px; background: linear-gradient(135deg,#7c6af7,#5e9cf7); border: none; border-radius: 8px; color: #fff; font-size: 1rem; cursor: pointer; transition: opacity .2s; }
            #login button:hover { opacity: .85; }
            #login-err { color: #f77; font-size: .85rem; margin-top: .8rem; min-height: 1.2em; }

            /* ── App ── */
            #app { display: none; width: 100vw; height: 100vh; flex-direction: column; }

            /* topbar */
            #topbar { display: flex; align-items: center; gap: .8rem; padding: 0 1.2rem; height: 48px; flex-shrink: 0; background: #1a1a2e; border-bottom: 1px solid #2a2a4a; }
            .tbtn { display: flex; align-items: center; gap: .4rem; background: none; border: 1px solid #2a2a4a; color: #a89cf7; border-radius: 6px; padding: 5px 12px; font-size: .85rem; cursor: pointer; transition: border-color .2s; white-space: nowrap; }
            .tbtn:hover { border-color: #7c6af7; }
            #page-title { font-size: .9rem; color: #666; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

            /* shell */
            #shell { flex: 1; display: flex; overflow: hidden; }

            /* sidebar */
            #sidebar { width: 240px; min-width: 180px; background: #1a1a2e; border-right: 1px solid #2a2a4a; display: flex; flex-direction: column; overflow: hidden; }
            #sidebar-header { padding: 1rem; border-bottom: 1px solid #2a2a4a; font-size: .85rem; color: #666; letter-spacing: .05em; }
            #tree { flex: 1; overflow-y: auto; padding: .4rem 0; }
            #tree::-webkit-scrollbar { width: 4px; }
            #tree::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
            .t-item { display: flex; align-items: center; gap: 6px; padding: 5px 12px; cursor: pointer; font-size: .86rem; user-select: none; transition: background .15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
            .t-item:hover { background: #252540; }
            .t-item.active { background: #2e2e55; color: #a89cf7; }
            .t-item .lbl { overflow: hidden; text-overflow: ellipsis; }
            .t-folder > .t-children { display: none; }
            .t-folder.open > .t-children { display: block; }
            .t-folder > .t-item .arr { font-size: .65rem; color: #555; transition: transform .2s; flex-shrink: 0; }
            .t-folder.open > .t-item .arr { transform: rotate(90deg); }
            .t-children { padding-left: 14px; }

            /* viewer */
            #viewer { flex: 1; overflow: auto; padding: 1.6rem; }
            #viewer::-webkit-scrollbar { width: 6px; }
            #viewer::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
            #placeholder { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #333; gap: .6rem; }
            #placeholder .big { font-size: 3rem; }
            #loading { display: none; padding: 3rem; text-align: center; color: #555; }

            /* iframe view */
            #iframe-wrap { display: none; width: 100%; height: 100%; }
            #iframe-wrap iframe { width: 100%; height: 100%; border: none; }

            /* md view */
            #md-view { display: none; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 10px; padding: 1.6rem; max-width: 800px; }
            .md-body { line-height: 1.9; color: #ccc; }
            .md-body h1 { font-size: 1.5rem; color: #fff; margin: .5rem 0 1rem; }
            .md-body h2 { font-size: 1.15rem; color: #e0e0e0; margin: 1.4rem 0 .5rem; border-bottom: 1px solid #2a2a4a; padding-bottom: .3rem; }
            .md-body h3 { font-size: 1rem; color: #ccc; margin: 1rem 0 .3rem; }
            .md-body p  { margin-bottom: .8rem; }
            .md-body ul, .md-body ol { padding-left: 1.4rem; margin-bottom: .8rem; }
            .md-body li { margin-bottom: .3rem; }
            .md-body a  { color: #7c6af7; text-decoration: none; }
            .md-body a:hover { text-decoration: underline; }
            .md-body blockquote { border-left: 3px solid #7c6af7; padding-left: .8rem; color: #888; margin: .6rem 0; }
            .md-body hr  { border: none; border-top: 1px solid #2a2a4a; margin: 1.2rem 0; }
            .md-body strong { color: #fff; }
            .md-body code { background: #0f0f1a; padding: 2px 6px; border-radius: 4px; font-size: .85em; color: #a89cf7; }
            .md-body pre  { background: #0f0f1a; padding: 1rem; border-radius: 8px; overflow-x: auto; margin-bottom: .8rem; }
            .md-body pre code { background: none; padding: 0; }
          </style>
        </head>
        <body>

        <div id="login">
          <h1>🔐 加密文件库</h1>
          <p>请输入密码以访问内容</p>
          <input type="password" id="pwd" placeholder="访问密码" />
          <button onclick="doLogin()">进入</button>
          <div id="login-err"></div>
        </div>

        <div id="app">
          <div id="topbar">
            <button class="tbtn" onclick="goHome()">🏠 主页</button>
            <button class="tbtn" id="back-btn" onclick="goBack()" style="display:none">← 返回</button>
            <span id="page-title"></span>
          </div>
          <div id="shell">
            <div id="sidebar">
              <div id="sidebar-header">📁 文件目录</div>
              <div id="tree"></div>
            </div>
            <div id="viewer">
              <div id="placeholder"><div class="big">🗂️</div><div>从左侧选择文件</div></div>
              <div id="loading">解密中...</div>
              <div id="iframe-wrap"><iframe id="frame" sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe></div>
              <div id="md-view"><div class="md-body" id="md-body"></div></div>
            </div>
          </div>
        </div>

        <script>
          let PASSWORD = '';
          let fileTree = [];
          let history_stack = [];

          document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

          async function doLogin() {
            const pwd = document.getElementById('pwd').value.trim();
            const err = document.getElementById('login-err');
            if (!pwd) { err.textContent = '请输入密码'; return; }
            try {
              fileTree = await (await fetch('./file-tree.json')).json();
              const first = findFirstFile(fileTree);
              if (!first) { bootApp(pwd); return; }
              const enc = await (await fetch('./encrypted/' + first)).text();
              const dec = CryptoJS.AES.decrypt(enc, pwd).toString(CryptoJS.enc.Utf8);
              if (dec) { err.textContent = ''; bootApp(pwd); }
              else { err.textContent = '密码错误，请重试'; }
            } catch(e) { err.textContent = '验证失败，请重试'; }
          }

          function findFirstFile(nodes) {
            for (const n of nodes) {
              if (n.type === 'file') return n.path;
              if (n.type === 'dir') { const f = findFirstFile(n.children); if (f) return f; }
            }
            return null;
          }

          function bootApp(pwd) {
            PASSWORD = pwd;
            document.getElementById('login').style.display = 'none';
            document.getElementById('app').style.display = 'flex';
            renderTree(fileTree, document.getElementById('tree'));
            openFileByName('index.html');
          }

          function findNode(nodes, name) {
            for (const n of nodes) {
              if (n.type === 'file' && n.name === name) return n;
              if (n.type === 'dir') { const f = findNode(n.children, name); if (f) return f; }
            }
            return null;
          }

          function renderTree(nodes, container) {
            nodes.forEach(node => {
              if (node.type === 'dir') {
                const wrap = document.createElement('div');
                wrap.className = 't-folder';
                const row = document.createElement('div');
                row.className = 't-item';
                row.innerHTML = `<span class="arr">▶</span><span>📂</span><span class="lbl">${node.name}</span>`;
                row.onclick = () => wrap.classList.toggle('open');
                const children = document.createElement('div');
                children.className = 't-children';
                renderTree(node.children, children);
                wrap.appendChild(row);
                wrap.appendChild(children);
                container.appendChild(wrap);
              } else {
                const item = document.createElement('div');
                item.className = 't-item';
                item.innerHTML = `<span>${getIcon(node.name)}</span><span class="lbl" title="${node.name}">${node.name}</span>`;
                item.dataset.path = node.path;
                item.dataset.name = node.name;
                item.onclick = () => openFile(node.path, node.name, item);
                container.appendChild(item);
              }
            });
          }

          function getIcon(name) {
            const ext = name.split('.').pop().toLowerCase();
            return {html:'🌐',htm:'🌐',md:'📝',txt:'📄',js:'📜',css:'🎨',json:'📋',png:'🖼️',jpg:'🖼️',jpeg:'🖼️',gif:'🖼️',svg:'🖼️',pdf:'📕'}[ext] || '📄';
          }

          let activeItem = null;

          async function openFile(encPath, name, itemEl) {
            if (activeItem) activeItem.classList.remove('active');
            activeItem = itemEl;
            if (itemEl) itemEl.classList.add('active');

            history_stack.push({ encPath, name, itemEl });
            document.getElementById('back-btn').style.display = history_stack.length > 1 ? 'flex' : 'none';
            document.getElementById('page-title').textContent = name.replace(/\.(html|md)$/i, '');

            document.getElementById('placeholder').style.display = 'none';
            document.getElementById('iframe-wrap').style.display = 'none';
            document.getElementById('md-view').style.display     = 'none';
            document.getElementById('loading').style.display     = 'block';

            try {
              const enc = await (await fetch('./encrypted/' + encPath)).text();
              const dec = CryptoJS.AES.decrypt(enc, PASSWORD).toString(CryptoJS.enc.Utf8);
              document.getElementById('loading').style.display = 'none';
              const ext = name.split('.').pop().toLowerCase();
              if (['html','htm'].includes(ext)) {
                const url = URL.createObjectURL(new Blob([dec], { type: 'text/html' }));
                document.getElementById('frame').src = url;
                document.getElementById('iframe-wrap').style.display = 'block';
              } else if (ext === 'md') {
                document.getElementById('md-body').innerHTML = renderMd(dec);
                document.getElementById('md-view').style.display = 'block';
              } else {
                document.getElementById('md-body').innerHTML = `<pre>${escHtml(dec)}</pre>`;
                document.getElementById('md-view').style.display = 'block';
              }
            } catch(e) {
              document.getElementById('loading').style.display = 'none';
              document.getElementById('md-body').innerHTML = '<p style="color:#f77">解密失败</p>';
              document.getElementById('md-view').style.display = 'block';
            }
          }

          function goHome() {
            history_stack = [];
            document.getElementById('back-btn').style.display = 'none';
            openFileByName('index.html');
          }

          function goBack() {
            if (history_stack.length <= 1) return;
            history_stack.pop();
            const prev = history_stack.pop();
            openFile(prev.encPath, prev.name, prev.itemEl);
          }

          window.openFileByName = function(name) {
            const node = findNode(fileTree, name);
            if (node) {
              const itemEl = document.querySelector(`.t-item[data-name="${name}"]`);
              openFile(node.path, node.name, itemEl);
            }
          };

          function escHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          }

          function renderMd(src) {
            // 先处理代码块，避免被其他规则影响
            const codeBlocks = [];
            src = src.replace(/```[\s\S]*?```/g, m => { codeBlocks.push(m); return `%%CODE${codeBlocks.length-1}%%`; });

            let h = escHtml(src);

            // 标题
            h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
            h = h.replace(/^## (.+)$/gm,  '<h2>$1</h2>');
            h = h.replace(/^# (.+)$/gm,   '<h1>$1</h1>');
            // 粗体/斜体
            h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            h = h.replace(/\*(.+?)\*/g,     '<em>$1</em>');
            // 链接 [text](url)
            h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
            // 引用
            h = h.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');
            // 列表
            h = h.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
            h = h.replace(/(<li>[\s\S]*?<\/li>)/g, '<ul>$1</ul>');
            // 分割线
            h = h.replace(/^---$/gm, '<hr>');
            // 行内代码
            h = h.replace(/`([^`]+)`/g, '<code>$1</code>');
            // 换行
            h = h.replace(/\n/g, '<br>');

            // 还原代码块
            codeBlocks.forEach((block, i) => {
              const code = escHtml(block.replace(/^```\w*\n?/, '').replace(/```$/, ''));
              h = h.replace(`%%CODE${i}%%`, `<pre><code>${code}</code></pre>`);
            });

            return h;
          }
        </script>
        </body>
        </html>
        HTMLEOF

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
