<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>运营数据库</title>
  <link rel="icon" type="image/png" href="./favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f0f1a; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

    /* ── Login ── */
    #login { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 20px; padding: 2rem 1.8rem; width: min(18rem, 92vw); text-align: center; box-shadow: 0 24px 80px rgba(0,0,0,.6); }
    #login .login-icon { font-size: 3rem; margin-bottom: 1rem; background: linear-gradient(135deg,#7c6af7,#5e9cf7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    #login h1 { font-size: 1.5rem; margin-bottom: .3rem; color: #fff; }
    #login p { color: #666; font-size: .88rem; margin-bottom: 2rem; }
    #login .input-wrap { position: relative; margin-bottom: 1rem; }
    #login .input-wrap i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #444; }
    #login input { width: 100%; padding: 12px 14px 12px 40px; background: #0f0f1a; border: 1px solid #2a2a4a; border-radius: 10px; color: #e0e0e0; font-size: 1rem; outline: none; transition: border-color .2s; }
    #login input:focus { border-color: #7c6af7; }
    #login button { width: 100%; padding: 13px; background: linear-gradient(135deg,#7c6af7,#5e9cf7); border: none; border-radius: 10px; color: #fff; font-size: 1rem; cursor: pointer; transition: opacity .2s; display: flex; align-items: center; justify-content: center; gap: .5rem; }
    #login button:hover { opacity: .85; }
    #login-err { color: #f77; font-size: .85rem; margin-top: .8rem; min-height: 1.2em; }

    /* ── App ── */
    #app { display: none; width: 100vw; height: 100vh; flex-direction: column; }

    /* ── Breadcrumb ── */
    #breadcrumb { display: flex; align-items: center; padding: 0 1rem; height: 2.6rem; flex-shrink: 0; background: #13132a; border-bottom: 1px solid #2a2a4a; font-size: 1rem; overflow-x: auto; white-space: nowrap; gap: 2px; }
    #breadcrumb::-webkit-scrollbar { height: 3px; }
    #breadcrumb::-webkit-scrollbar-thumb { background: #333; }
    .bc-item { color: #7c6af7; cursor: pointer; padding: 3px 6px; border-radius: 5px; transition: background .15s; display: flex; align-items: center; gap: 4px; }
    .bc-item:hover { background: #252545; }
    .bc-sep { color: #333; margin: 0 1px; }
    .bc-current { color: #888; padding: 3px 6px; }
    .font-btn { background: #1e1e3a; border: 1px solid #2a2a4a; color: #aaa; border-radius: 6px; padding: 2px 8px; cursor: pointer; font-size: .85rem; transition: background .15s; flex-shrink: 0; }
    .font-btn:hover { background: #2a2a50; color: #fff; }

    /* ── Shell ── */
    #shell { flex: 1; overflow: hidden; display: flex; }

    /* ── Sidebar ── */
    #sidebar { width: 14rem; min-width: 10rem; background: #13132a; border-right: 1px solid #1e1e3a; display: flex; flex-direction: column; overflow: hidden; transition: transform .25s; }
    #sidebar-header { padding: .9rem 1rem; border-bottom: 1px solid #1e1e3a; font-size: .75rem; color: #444; letter-spacing: .08em; text-transform: uppercase; display: flex; align-items: center; gap: .5rem; }
    #tree { flex: 1; overflow-y: auto; padding: .4rem 0; }
    #tree::-webkit-scrollbar { width: 3px; }
    #tree::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 2px; }
    .t-item { display: flex; align-items: center; gap: 6px; padding: 6px 10px; cursor: pointer; font-size: .83rem; user-select: none; transition: background .15s; white-space: nowrap; overflow: hidden; border-radius: 4px; margin: 1px 4px; }
    .t-item:hover { background: #1e1e3a; }
    .t-item.active { background: #252550; color: #a89cf7; }
    .t-item .lbl { overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .t-item .t-fa { width: 14px; text-align: center; flex-shrink: 0; font-size: .8rem; }
    .t-folder > .t-children { display: none; }
    .t-folder.open > .t-children { display: block; }
    .t-folder > .t-item .arr { font-size: .55rem; color: #444; transition: transform .2s; flex-shrink: 0; }
    .t-folder.open > .t-item .arr { transform: rotate(90deg); color: #666; }
    .t-children { padding-left: 14px; }

    /* 手机：侧边栏变抽屉 */
    @media (max-width: 899px) {
      #sidebar { position: fixed; left: 0; top: 0; height: 100vh; z-index: 200; transform: translateX(-100%); width: 75vw; box-shadow: 4px 0 20px rgba(0,0,0,.5); }
      #sidebar.open { transform: translateX(0); }
      #sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 199; }
      #sidebar-overlay.show { display: block; }
      #menu-btn { display: flex; }
    }
    @media (min-width: 900px) {
      #menu-btn { display: none !important; }
      #sidebar-overlay { display: none !important; }
    }

    /* 汉堡按钮 */
    #menu-btn { display: none; align-items: center; justify-content: center; width: 2.2rem; height: 2.2rem; background: none; border: none; color: #7c6af7; font-size: 1.1rem; cursor: pointer; flex-shrink: 0; margin-right: .3rem; }

    /* ── Viewer ── */
    #viewer { flex: 1; overflow: auto; padding: .8rem; background: #0f0f1a; }
    #viewer::-webkit-scrollbar { width: 6px; }
    #viewer::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 3px; }

    /* ── Folder view ── */
    #folder-view { display: none; }
    .fv-header { display: flex; align-items: center; gap: .8rem; margin-bottom: 1.6rem; }
    .fv-header .fv-icon-big { font-size: 2rem; }
    .fv-title { font-size: 1.3rem; color: #fff; font-weight: 600; }
    .fv-subtitle { font-size: .82rem; color: #444; margin-top: .1rem; }
    .fv-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.2rem; max-width: 56rem; }
    @media (max-width: 899px) { .fv-grid { grid-template-columns: repeat(2, 1fr); gap: .6rem; } }
    .fv-row { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; padding: 2.5rem 1rem; background: #1a1a2e; border: 1px solid #1e1e3a; border-radius: 18px; cursor: pointer; transition: border-color .15s, background .15s, transform .12s; text-align: center; }
    .fv-row:hover { border-color: #7c6af7; background: #1c1c38; transform: translateY(-4px); box-shadow: 0 10px 30px rgba(124,106,247,.18); }
    .fv-row .fv-icon { width: 90px; height: 90px; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2.8rem; flex-shrink: 0; }
    @media (max-width: 899px) { .fv-row { padding: 1.4rem .6rem; gap: .6rem; } .fv-row .fv-icon { width: 3rem; height: 3rem; font-size: 1.5rem; border-radius: 12px; } }
    .fv-row .fv-icon.dir  { background: #1e1e40; color: #7c6af7; }
    .fv-row .fv-icon.file { background: #1a2a1a; color: #6af7a0; }
    .fv-row .fv-icon.md   { background: #1a2535; color: #5e9cf7; }
    .fv-row .fv-name { font-size: 1.1rem; color: #ddd; line-height: 1.3; word-break: break-all; }
    .fv-row .fv-badge { font-size: .72rem; color: #555; background: #13132a; border: 1px solid #2a2a4a; padding: 2px 10px; border-radius: 20px; }

    /* ── Search view ── */
    #search-view { max-width: 860px; }
    .sv-header { font-size: 1rem; color: #888; margin-bottom: 1rem; }
    .sv-header span { color: #a89cf7; }
    .sv-item { display: flex; align-items: center; gap: .8rem; padding: .7rem 1rem; background: #1a1a2e; border: 1px solid #1e1e3a; border-radius: 8px; margin-bottom: .4rem; cursor: pointer; transition: border-color .15s, background .15s; }
    .sv-item:hover { border-color: #7c6af7; background: #1c1c38; }
    .sv-item .sv-icon { color: #5e9cf7; width: 1.2rem; text-align: center; flex-shrink: 0; }
    .sv-item .sv-name { color: #e0e0e0; font-size: .95rem; flex-shrink: 0; }
    .sv-item .sv-path { color: #555; font-size: .8rem; margin-left: .4rem; }
    .sv-empty { color: #444; padding: 2rem; text-align: center; }
    .sv-err { color: #f77; padding: .5rem 1rem; font-size: .85rem; background: #2a1a1a; border-radius: 6px; margin-bottom: .8rem; }
    #regex-btn.active { background: #2a2a50; color: #a89cf7; border-color: #7c6af7; }
    #file-view { display: none; }
    #loading { display: none; padding: 3rem; text-align: center; color: #444; }
    #loading i { font-size: 1.5rem; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #placeholder { height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #2a2a4a; gap: .8rem; }
    #placeholder i { font-size: 4rem; }
    #placeholder span { font-size: .9rem; color: #333; }

    /* ── iframe ── */
    #iframe-wrap { display: none; width: 100%; height: 80vh; }
    #iframe-wrap iframe { width: 100%; height: 100%; border: none; border-radius: 10px; }

    /* ── Markdown ── */
    #md-wrap { display: none; background: #1a1a2e; border: 1px solid #1e1e3a; border-radius: 12px; padding: 2rem; width: 100%; }
    .md-body { line-height: 2; color: #ccc; font-size: 1.05rem; }
    .md-body h1 { font-size: 1.8rem; color: #fff; margin: .5rem 0 1.2rem; padding-bottom: .6rem; border-bottom: 1px solid #2a2a4a; }
    .md-body h2 { font-size: 1.35rem; color: #e0e0e0; margin: 1.6rem 0 .6rem; }
    .md-body h3 { font-size: 1.15rem; color: #ccc; margin: 1.2rem 0 .4rem; }
    .md-body p { margin-bottom: 1rem; }
    .md-body ul, .md-body ol { padding-left: 1.5rem; margin-bottom: 1rem; }
    .md-body li { margin-bottom: .4rem; }
    .md-body a { color: #7c6af7; text-decoration: none; }
    .md-body a:hover { text-decoration: underline; color: #a89cf7; }
    .md-body blockquote { border-left: 3px solid #7c6af7; padding: .4rem .8rem; color: #777; margin: .8rem 0; background: #13132a; border-radius: 0 6px 6px 0; }
    .md-body hr { border: none; border-top: 1px solid #2a2a4a; margin: 1.4rem 0; }
    .md-body strong { color: #fff; }
    .md-body em { color: #a89cf7; }
    .md-body code { background: #0f0f1a; padding: 2px 7px; border-radius: 4px; font-size: .85em; color: #a89cf7; border: 1px solid #2a2a4a; }
    .md-body pre { background: #0f0f1a; padding: 1.2rem; border-radius: 8px; overflow-x: auto; margin-bottom: 1rem; border: 1px solid #1e1e3a; }
    .md-body table { width: 100%; border-collapse: collapse; margin-bottom: 1.2rem; font-size: .95rem; }
    @media (max-width: 899px) { #md-wrap { padding: .8rem; } .md-body { font-size: .95rem; } .md-body table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; } }
    .md-body th { background: #1e1e40; color: #a89cf7; padding: 9px 13px; text-align: left; border: 1px solid #2a2a4a; font-weight: 600; }
    .md-body td { padding: 8px 13px; border: 1px solid #1e1e3a; }
    .md-body tr:nth-child(even) td { background: #141428; }
    .md-body tr:hover td { background: #1a1a35; }
  </style>
</head>
<body>

<div id="login">
  <div class="login-icon"><i class="fa-solid fa-shield-halved"></i></div>
  <h1>运营数据库</h1>
  <p>请输入密码以访问内容</p>
  <div class="input-wrap">
    <i class="fa-solid fa-key"></i>
    <input type="password" id="pwd" placeholder="访问密码" />
  </div>
  <button onclick="doLogin()"><i class="fa-solid fa-right-to-bracket"></i> 进入</button>
  <div id="login-err"></div>
</div>

<div id="app">
  <div id="breadcrumb">
    <button id="menu-btn" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
    <span id="bc-content" style="flex:1;display:flex;align-items:center;gap:2px;overflow-x:auto;"></span>
    <div style="display:flex;gap:.3rem;flex-shrink:0;margin-left:.5rem;align-items:center;">
      <div style="position:relative;display:flex;align-items:center;gap:.3rem;">
        <div style="position:relative;">
          <i class="fa-solid fa-magnifying-glass" style="position:absolute;left:8px;top:50%;transform:translateY(-50%);color:#444;font-size:.8rem;pointer-events:none;"></i>
          <input id="search-input" placeholder="搜索文件名... (支持正则)" onkeydown="if(event.key==='Enter')doSearch()" style="background:#1e1e3a;border:1px solid #2a2a4a;border-radius:6px 0 0 6px;color:#ccc;padding:3px 8px 3px 26px;font-size:.85rem;width:10rem;outline:none;">
        </div>
        <button class="font-btn" onclick="doSearch()" style="border-radius:0 6px 6px 0;border-left:none;padding:3px 10px;"><i class="fa-solid fa-search"></i></button>
        <button class="font-btn" id="regex-btn" onclick="toggleRegex()" title="正则模式" style="font-size:.75rem;">.*</button>
      </div>
      <button class="font-btn" id="sort-btn" onclick="toggleSort()" title="排序">⇅ 名称</button>
      <button class="font-btn" onclick="adjustFont(-1)" title="缩小字体">A-</button>
      <button class="font-btn" onclick="adjustFont(1)"  title="放大字体">A+</button>
    </div>
  </div>
  <div id="sidebar-overlay" onclick="toggleSidebar()"></div>
  <div id="shell">
    <div id="sidebar">
      <div id="sidebar-header"><i class="fa-solid fa-folder-tree"></i> 文件目录</div>
      <div id="tree"></div>
    </div>
    <div id="viewer">
      <div id="placeholder"><i class="fa-regular fa-folder-open"></i><span>从左侧选择文件</span></div>
      <div id="loading"><i class="fa-solid fa-circle-notch"></i></div>
      <div id="search-view" style="display:none;"></div>
      <div id="folder-view">
        <div class="fv-header">
          <div class="fv-icon-big" id="fv-icon-big"></div>
          <div><div class="fv-title" id="fv-title"></div><div class="fv-subtitle" id="fv-subtitle"></div></div>
        </div>
        <div class="fv-grid" id="fv-grid"></div>
      </div>
      <div id="file-view">
        <div id="iframe-wrap"><iframe id="frame" sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"></iframe></div>
        <div id="md-wrap"><div class="md-body" id="md-body"></div></div>
      </div>
    </div>
  </div>
</div>

<script>
  let PASSWORD = '';
  let fileTree = [];
  let pathStack = [];

  // 平台图标映射
  const PLATFORM_ICONS = {
    '腾讯':    { fa: 'fa-brands fa-weixin',    color: '#07c160' },
    '抖音':    { fa: 'fa-brands fa-tiktok',    color: '#fe2c55' },
    '快手':    { fa: 'fa-solid fa-video',       color: '#ff6600' },
    '小红书':  { fa: 'fa-solid fa-book-open',   color: '#ff2442' },
    'YouTube': { fa: 'fa-brands fa-youtube',   color: '#ff0000' },
    'Bilibili':{ fa: 'fa-brands fa-bilibili',  color: '#00a1d6' },
  };

  // 初始字号：桌面 54px，手机 18px
  (function() {
    const size = window.innerWidth >= 900 ? 20 : 16;
    document.documentElement.style.fontSize = size + 'px';
  })();

  function adjustFont(dir) {
    const cur = parseFloat(document.documentElement.style.fontSize) || 18;
    document.documentElement.style.fontSize = Math.min(Math.max(cur + dir * 4, 14), 80) + 'px';
  }

  function goBack() {
    if (pathStack.length <= 1) {
      openFolder('主页', fileTree, []);
    } else {
      const parent = pathStack[pathStack.length - 2];
      openFolder(parent.name, parent.nodes, pathStack.slice(0, pathStack.length - 2));
    }
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-overlay').classList.toggle('show');
  }

  document.getElementById('pwd').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

  async function doLogin() {
    const pwd = document.getElementById('pwd').value.trim();
    const err = document.getElementById('login-err');
    if (!pwd) { err.textContent = '请输入密码'; return; }
    try {
      fileTree = await (await fetch('./file-tree.json')).json();
      const first = findFirstFile(fileTree);
      if (!first) { bootApp(pwd); return; }
      const enc = await (await fetch('./encrypted/' + first)).text();
      const dec = CryptoJS.AES.decrypt(enc, pwd).toString(CryptoJS.enc.Utf8);
      if (dec) { err.textContent = ''; bootApp(pwd); }
      else { err.textContent = '密码错误，请重试'; }
    } catch(e) { err.textContent = '验证失败，请重试'; }
  }

  function findFirstFile(nodes) {
    for (const n of nodes) {
      if (n.type === 'file') return n.path;
      if (n.type === 'dir') { const f = findFirstFile(n.children); if (f) return f; }
    }
    return null;
  }

  function bootApp(pwd) {
    PASSWORD = pwd;
    document.getElementById('login').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    renderSidebar(fileTree, document.getElementById('tree'));
    openFolder('主页', fileTree, []);
  }

  // ── 侧边栏 ──
  function getPlatformIcon(name) {
    const p = PLATFORM_ICONS[name];
    if (p) return `<i class="t-fa ${p.fa}" style="color:${p.color}"></i>`;
    return `<i class="t-fa fa-solid fa-folder" style="color:#7c6af7"></i>`;
  }

  function getFileIconFA(name) {
    const ext = name.split('.').pop().toLowerCase();
    const map = { md:'fa-solid fa-file-lines', html:'fa-solid fa-globe', htm:'fa-solid fa-globe', txt:'fa-solid fa-file-alt', pdf:'fa-solid fa-file-pdf' };
    const cls = map[ext] || 'fa-solid fa-file';
    const col = ext === 'md' ? '#5e9cf7' : ext === 'html' ? '#f7a25e' : '#888';
    return `<i class="t-fa ${cls}" style="color:${col}"></i>`;
  }

  function renderSidebar(nodes, container, depth) {
    depth = depth || 0;
    nodes.forEach(node => {
      if (node.type === 'dir') {
        const wrap = document.createElement('div');
        wrap.className = 't-folder';
        const row = document.createElement('div');
        row.className = 't-item';
        const icon = depth === 0 ? getPlatformIcon(node.name) : `<i class="t-fa fa-solid fa-folder" style="color:#7c6af7"></i>`;
        row.innerHTML = `<span class="arr">▶</span>${icon}<span class="lbl">${node.name}</span>`;
        row.onclick = () => {
          wrap.classList.toggle('open');
          const fp = getPathToDir(fileTree, node.name, node.children);
          openFolder(node.name, node.children, fp || []);
        };
        const ch = document.createElement('div');
        ch.className = 't-children';
        renderSidebar(node.children, ch, depth + 1);
        wrap.appendChild(row); wrap.appendChild(ch);
        container.appendChild(wrap);
      } else {
        const item = document.createElement('div');
        item.className = 't-item';
        item.dataset.path = node.path;
        item.innerHTML = getFileIconFA(node.name) + `<span class="lbl" title="${node.name}">${node.name}</span>`;
        item.onclick = () => {
          setActive(item);
          openFile(node);
          document.getElementById('sidebar').classList.remove('open');
          document.getElementById('sidebar-overlay').classList.remove('show');
        };
        container.appendChild(item);
      }
    });
  }

  let currentFolderNodes = [];
  let sortMode = 'default'; // default | name-asc | name-desc | type

  let useRegex = false;

  function toggleRegex() {
    useRegex = !useRegex;
    document.getElementById('regex-btn').classList.toggle('active', useRegex);
  }

  // 递归收集当前文件夹及子文件夹所有文件
  function collectFiles(nodes, pathPrefix) {
    let results = [];
    for (const n of nodes) {
      if (n.type === 'file') {
        results.push({ node: n, location: pathPrefix });
      } else if (n.type === 'dir') {
        results = results.concat(collectFiles(n.children, pathPrefix ? pathPrefix + ' / ' + n.name : n.name));
      }
    }
    return results;
  }

  function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) { renderFolderGrid(currentFolderNodes); showPanel('folder'); return; }

    let matcher;
    const sv = document.getElementById('search-view');
    if (useRegex) {
      try { const re = new RegExp(q, 'i'); matcher = name => re.test(name); }
      catch(e) {
        showPanel('search');
        sv.innerHTML = `<div class="sv-err"><i class="fa-solid fa-triangle-exclamation"></i> 正则错误: ${e.message}</div>`;
        return;
      }
    } else {
      matcher = name => name.toLowerCase().includes(q.toLowerCase());
    }

    // 搜索当前文件夹（currentFolderNodes）及其子文件夹
    const all = collectFiles(currentFolderNodes, '');
    const hits = all.filter(r => matcher(r.node.name));

    showPanel('search');
    sv.innerHTML = `<div class="sv-header">在 <span>${pathStack[pathStack.length-1]?.name || '主页'}</span> 中找到 <span>${hits.length}</span> 个结果</div>`;
    if (!hits.length) { sv.innerHTML += `<div class="sv-empty">没有匹配的文件</div>`; return; }

    hits.forEach(({ node, location }) => {
      const row = document.createElement('div');
      row.className = 'sv-item';
      row.innerHTML = `<i class="sv-icon fa-solid fa-file-lines"></i>`
        + `<span class="sv-name">${node.name}</span>`
        + `<span class="sv-path">${location || '当前目录'}</span>`;
      row.onclick = () => { setActive(null); openFile(node); };
      sv.appendChild(row);
    });
  }

  function onSearch() {
    // 清空时恢复文件夹视图
    if (!document.getElementById('search-input').value.trim()) {
      renderFolderGrid(currentFolderNodes);
      showPanel('folder');
    }
  }

  function toggleSort() {
    const modes = ['default','name-asc','name-desc','type'];
    const labels = ['⇅ 默认','↑ 名称','↓ 名称','⇅ 类型'];
    sortMode = modes[(modes.indexOf(sortMode) + 1) % modes.length];
    document.getElementById('sort-btn').textContent = labels[modes.indexOf(sortMode)];
    renderFolderGrid(currentFolderNodes);
  }

  function getSortedFiltered(nodes) {
    let list = [...nodes];
    if (sortMode === 'name-asc')  list.sort((a,b) => a.name.localeCompare(b.name));
    if (sortMode === 'name-desc') list.sort((a,b) => b.name.localeCompare(a.name));
    if (sortMode === 'type') list.sort((a,b) => {
      if (a.type !== b.type) return a.type === 'dir' ? -1 : 1;
      return a.name.localeCompare(b.name);
    });
    if (sortMode === 'default') list.sort((a,b) => {
      if (a.type !== b.type) return a.type === 'dir' ? -1 : 1;
      return 0;
    });
    return list;
  }

  function renderFolderGrid(nodes) {
    const grid = document.getElementById('fv-grid');
    grid.innerHTML = '';

    // 返回上一级卡片（主页时不显示）
    if (pathStack.length >= 1 && !(pathStack.length === 1 && pathStack[0].name === '主页')) {
      const back = document.createElement('div');
      back.className = 'fv-row';
      back.innerHTML = `<div class="fv-icon dir"><i class="fa-solid fa-arrow-left"></i></div><span class="fv-name">返回上一级</span><span class="fv-badge">返回</span>`;
      back.onclick = () => goBack();
      grid.appendChild(back);
    }

    const list = getSortedFiltered(nodes);
    list.forEach(node => {
      const row = document.createElement('div');
      row.className = 'fv-row';
      const isDir = node.type === 'dir';
      const ext = isDir ? '' : node.name.split('.').pop().toLowerCase();
      const iconClass = isDir ? 'dir' : (ext === 'md' ? 'md' : 'file');
      const pp = PLATFORM_ICONS[node.name];
      const iconHTML = isDir
        ? (pp ? `<i class="${pp.fa}" style="color:${pp.color}"></i>` : `<i class="fa-solid fa-folder"></i>`)
        : (ext === 'md' ? `<i class="fa-solid fa-file-lines"></i>` : `<i class="fa-solid fa-globe"></i>`);
      row.innerHTML = `<div class="fv-icon ${iconClass}">${iconHTML}</div>`
        + `<span class="fv-name">${node.name}</span>`
        + `<span class="fv-badge">${isDir ? '文件夹' : ext.toUpperCase()}</span>`;
      row.onclick = () => {
        if (isDir) {
          const fp = getPathToDir(fileTree, node.name, node.children);
          openFolder(node.name, node.children, fp);
        } else {
          const el = document.querySelector(`.t-item[data-path="${node.path}"]`);
          setActive(el); openFile(node);
        }
      };
      grid.appendChild(row);
    });
  }
  let activeItem = null;
  function setActive(el) {
    if (activeItem) activeItem.classList.remove('active');
    activeItem = el;
    if (el) el.classList.add('active');
  }

  // ── 文件夹视图 ──
  function openFolder(name, nodes, pathArr) {
    pathStack = pathArr.concat([{ name, nodes }]);
    renderBreadcrumb();
    showPanel('folder');
    const p = PLATFORM_ICONS[name];
    document.getElementById('fv-icon-big').innerHTML = p
      ? `<i class="fa-solid ${p.fa.split(' ')[1] || p.fa}" style="color:${p.color};font-size:2rem"></i>`
      : `<i class="fa-solid fa-folder-open" style="color:#7c6af7;font-size:2rem"></i>`;
    document.getElementById('fv-title').textContent = name === '主页' ? '所有平台' : name;
    document.getElementById('fv-subtitle').textContent = nodes.filter(n=>n.type==='dir').length + ' 个文件夹  ' + nodes.filter(n=>n.type==='file').length + ' 个文件';
    currentFolderNodes = nodes;
    document.getElementById('search-input').value = '';
    showPanel('folder');
    renderFolderGrid(nodes);
  }

  // ── 文件视图 ──
  async function openFile(node) {
    pathStack = getPathByFilePath(fileTree, node.path) || [];
    renderBreadcrumb(node.name);
    showPanel('loading');
    try {
      const enc = await (await fetch('./encrypted/' + node.path)).text();
      if (!enc || enc.startsWith('<!')) throw new Error('文件未找到');
      const dec = CryptoJS.AES.decrypt(enc.trim(), PASSWORD).toString(CryptoJS.enc.Utf8);
      if (!dec) throw new Error('解密结果为空');
      const ext = node.name.split('.').pop().toLowerCase();
      if (['html','htm'].includes(ext)) {
        showPanel('iframe');
        document.getElementById('frame').src = URL.createObjectURL(new Blob([dec], {type:'text/html'}));
      } else if (ext === 'md') {
        showPanel('md');
        document.getElementById('md-body').innerHTML = renderMd(dec);
      } else {
        showPanel('md');
        document.getElementById('md-body').innerHTML = '<pre>' + escHtml(dec) + '</pre>';
      }
    } catch(e) {
      showPanel('md');
      document.getElementById('md-body').innerHTML = `<p style="color:#f77"><i class="fa-solid fa-triangle-exclamation"></i> 解密失败: ${e.message}</p>`;
    }
  }

  // ── 面包屑 ──
  function renderBreadcrumb(currentFile) {
    const bc = document.getElementById('bc-content');
    bc.innerHTML = '';
    const home = document.createElement('span');
    home.className = 'bc-item';
    home.innerHTML = '<i class="fa-solid fa-house"></i> 主页';
    home.onclick = () => openFolder('主页', fileTree, []);
    bc.appendChild(home);
    pathStack.forEach((seg, i) => {
      const sep = document.createElement('span');
      sep.className = 'bc-sep'; sep.textContent = '/';
      bc.appendChild(sep);
      const isLast = i === pathStack.length - 1 && !currentFile;
      const el = document.createElement('span');
      el.className = isLast ? 'bc-current' : 'bc-item';
      const p = PLATFORM_ICONS[seg.name];
      el.innerHTML = (p ? `<i class="${p.fa}" style="color:${p.color}"></i> ` : '') + seg.name;
      if (!isLast) el.onclick = () => openFolder(seg.name, seg.nodes, pathStack.slice(0, i));
      bc.appendChild(el);
    });
    if (currentFile) {
      const sep = document.createElement('span');
      sep.className = 'bc-sep'; sep.textContent = '/';
      bc.appendChild(sep);
      const el = document.createElement('span');
      el.className = 'bc-current';
      el.innerHTML = `<i class="fa-solid fa-file-lines" style="color:#5e9cf7"></i> ${currentFile}`;
      bc.appendChild(el);
    }
  }

  // ── 工具 ──
  function showPanel(type) {
    document.getElementById('placeholder').style.display  = 'none';
    document.getElementById('loading').style.display      = type === 'loading' ? 'block' : 'none';
    document.getElementById('search-view').style.display  = type === 'search'  ? 'block' : 'none';
    document.getElementById('folder-view').style.display  = type === 'folder'  ? 'block' : 'none';
    document.getElementById('file-view').style.display    = ['iframe','md'].includes(type) ? 'block' : 'none';
    document.getElementById('iframe-wrap').style.display  = type === 'iframe'  ? 'block' : 'none';
    document.getElementById('md-wrap').style.display      = type === 'md'      ? 'block' : 'none';
  }

  function findNodeByName(nodes, name) {
    for (const n of nodes) {
      if (n.type === 'file' && n.name === name) return n;
      if (n.type === 'dir') { const f = findNodeByName(n.children, name); if (f) return f; }
    }
    return null;
  }

  function getPathByFilePath(nodes, filePath, stack) {
    stack = stack || [];
    for (const n of nodes) {
      if (n.type === 'file' && n.path === filePath) return stack;
      if (n.type === 'dir') {
        const res = getPathByFilePath(n.children, filePath, stack.concat([{name: n.name, nodes: n.children}]));
        if (res !== null) return res;
      }
    }
    return null;
  }

  function getPathToDir(nodes, dirName, dirChildren, stack) {
    stack = stack || [];
    for (const n of nodes) {
      if (n.type === 'dir') {
        if (n.name === dirName && n.children === dirChildren) return stack;
        const res = getPathToDir(n.children, dirName, dirChildren, stack.concat([{name: n.name, nodes: n.children}]));
        if (res !== null) return res;
      }
    }
    return null;
  }

  function escHtml(s) {
    return s.replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>');
  }

  function renderMd(src) {
    // 去除 BOM，统一换行符
    src = src.replace(/^\uFEFF/, '').replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim();
    return marked.parse(src, { gfm: true, breaks: false });
  }

  window.appNav = function(target) {
    if (target.startsWith('folder:')) {
      const name = target.slice(7);
      const node = fileTree.find(n => n.type === 'dir' && n.name === name);
      if (node) openFolder(node.name, node.children, []);
    } else {
      const node = findNodeByName(fileTree, target);
      if (node) openFile(node);
    }
  };
</script>
</body>
