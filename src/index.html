<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>内容导航</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 480px;
      padding: 2.5rem 2rem;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.4rem;
      color: #fff;
    }
    p {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }
    .card {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 1.2rem 1.4rem;
      margin-bottom: 1rem;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transition: border-color .2s, background .2s;
    }
    .card:hover {
      border-color: #7c6af7;
      background: #1e1e38;
    }
    .card .icon {
      font-size: 2rem;
      flex-shrink: 0;
    }
    .card .info h2 {
      font-size: 1rem;
      margin-bottom: 0.2rem;
      color: #fff;
    }
    .card .info span {
      font-size: 0.82rem;
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📚 内容导航</h1>
    <p>选择要查看的文档</p>

    <a class="card" onclick="openFile('投放宝典.md')">
      <div class="icon">🎯</div>
      <div class="info">
        <h2>投放宝典</h2>
        <span>投放策略与操作指南</span>
      </div>
    </a>

    <a class="card" onclick="openFile('数据采集.md')">
      <div class="icon">📊</div>
      <div class="info">
        <h2>数据采集</h2>
        <span>数据采集方法与规范</span>
      </div>
    </a>
  </div>

  <script>
    function openFile(filename) {
      // 通知父页面（加密外壳）打开对应文件
      if (window.parent && window.parent.openFileByName) {
        window.parent.openFileByName(filename);
      }
    }
  </script>
</body>
</html>
